# Web service: serves HTML/CSS/JS and handles form POSTs (see server.js).
# Free instances may sleep after idle; first request can be slow.

services:
  - type: web
    name: aspen-grove-companion
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      # Set in the Render dashboard (Postgres add-on connection string, Neon, Supabase, etc.)
      - key: DATABASE_URL
        sync: false
      # Render Free blocks SMTP; use SENDGRID_API_KEY + EMAIL_FROM (HTTPS). See DEPLOY-RENDER.txt.
      - key: SENDGRID_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_TO
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
      - key: SMTP_URL
        sync: false
