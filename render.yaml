# Web service: serves HTML/CSS/JS and handles form POSTs (see server.js).
# Free instances may sleep after idle; first request can be slow.

services:
  - type: web
    name: aspen-grove-companion
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      # Set in the Render dashboard (Postgres add-on connection string, Neon, Supabase, etc.)
      - key: DATABASE_URL
        sync: false
      # Optional: home contact form copies to EMAIL_TO (see DEPLOY-RENDER.txt). Example: SendGrid SMTP_URL.
      - key: SMTP_URL
        sync: false
      - key: EMAIL_FROM
        sync: false
